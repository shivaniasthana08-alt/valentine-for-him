<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Final ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
min-height:100vh;
background:#8b0000;
color:white;
font-family:"Cormorant Garamond",serif;
display:flex;
justify-content:center;
align-items:center;
overflow-x:hidden;
text-align:center;
padding:20px;
}

.claps{
position:fixed;
inset:0;
pointer-events:none;
z-index:0;
}

.clap{
position:absolute;
top:-20px;
font-size:28px;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(110vh);}
}

.card{
position:relative;
z-index:2;
background:rgba(0,0,0,0.28);
padding:50px 40px;
border-radius:26px;
max-width:600px;
width:90%;
}

h1{
font-size:40px;
margin-bottom:25px;
line-height:1.3;
}

img{
width:100%;
max-width:300px;
border-radius:18px;
}

@media(max-width:600px){

.card{
padding:35px 25px;
}

h1{
font-size:30px;
}

img{
max-width:240px;
}

}

</style>
</head>

<body>

<div class="claps" id="claps"></div>

<div class="card">

<h1>Ok, That was fun! Well now</h1>

<img src="move.gif">

</div>

<script>

const claps=document.getElementById("claps")

const emojis=["👏","🙉","💖","🎉"]

for(let i=0;i<40;i++){

const c=document.createElement("div")

c.className="clap"

c.textContent=emojis[Math.floor(Math.random()*emojis.length)]

c.style.left=Math.random()*100+"vw"

c.style.animationDuration=4+Math.random()*5+"s"

claps.appendChild(c)

}

</script>

</body>
</html>
