<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Service Packages</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght=500;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
min-height:100vh;
min-height:100dvh; /* Prevents Safari UI from cutting off the bottom */
background:#8b0000;
color:white;
font-family:"Cormorant Garamond",serif;
display:flex;
justify-content:center;
align-items:center;
overflow-x:hidden;
padding:20px;
-webkit-font-smoothing: antialiased;
box-sizing: border-box;
}

.hearts{
position:fixed;
inset:0;
pointer-events:none;
z-index:0;
}

.heart{
position:absolute;
top:-20px;
color:rgba(255,215,215,0.35);
font-size:16px;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(110vh);}
}

.explosion-heart{
position:fixed;
font-size:22px;
animation:explode 800ms ease-out forwards;
pointer-events:none;
}

@keyframes explode{
0%{transform:scale(0);opacity:1;}
100%{transform:translate(var(--x),var(--y)) scale(1.6);opacity:0;}
}

.card{
position:relative;
z-index:2;
background:rgba(0,0,0,0.28);
padding:60px 60px;
border-radius:26px;
text-align:center;
width:90%;
max-width:900px;
box-sizing: border-box;
}

h1{
font-size:34px;
margin-bottom:40px;
line-height:1.3;
}

.packages{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:26px;
}

.package{
padding:34px;
border-radius:18px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.3);
cursor:pointer;
font-size:24px;
transition:all .18s ease;
box-shadow:0 6px 0 rgba(0,0,0,0.45);
-webkit-tap-highlight-color: transparent; /* Removes the ugly iOS gray flash on tap */
}

.package:hover{
transform:translateY(-4px);
}

.package:active{
transform:scale(.95);
}

.hidden{
display:none;
}

.result{
margin-top:40px;
font-size:22px;
line-height:1.5;
display: flex;
flex-direction: column;
align-items: center;
}

.result img{
width:100%;
max-width:260px;
margin-top:20px;
border-radius:16px;
}

.spin-links{
display:flex;
justify-content:center;
gap:60px;
font-size:64px;
margin-top:20px;
margin-bottom:20px;
}

.spin-links a{
text-decoration:none;
animation:spin 2s linear infinite;
display: inline-block;
-webkit-tap-highlight-color: transparent;
}

/* Custom Continue Button for the links selection */
.continue-btn {
margin-top: 25px;
background: #f4e1c1;
color: #3b0000;
border: none;
padding: 12px 35px;
font-size: 18px;
border-radius: 12px;
cursor: pointer;
font-family: inherit;
font-weight: 600;
transition: transform 0.2s;
-webkit-appearance: none;
appearance: none;
}

.continue-btn:active {
transform: scale(0.95);
}

@keyframes spin{
to{transform:rotate(360deg);}
}

@media(max-width:700px){

.card{
padding:40px 24px;
}

h1{
font-size:28px;
}

.packages{
grid-template-columns:1fr;
gap:18px;
}

.package{
font-size:20px;
padding:26px;
}

.spin-links{
font-size:52px;
gap:40px;
}

.result{
font-size:20px;
}

}

</style>
</head>head>

<body>

<div class="hearts" id="hearts"></div>

<div class="card">

<h1 id="heading">
Ok coder — please select one of the following<br>
<strong>Service Packages</strong> to commit to the database.
</h1>

<div class="packages" id="packages">

<div class="package" data-type="home">Home Court Advantage</div>
<div class="package" data-type="spin">Spin & Sculpt</div>
<div class="package" data-type="throughput">Unlimited Throughput</div>
<div class="package" data-type="offgrid">Off-Grid Query</div>

</div>

<div id="result" class="result hidden"></div>

</div>

<script>

/* falling hearts */

const hearts=document.getElementById("hearts")

for(let i=0;i<30;i++){

const h=document.createElement("div")
h.className="heart"
h.textContent="♥"
h.style.left=Math.random()*100+"vw"
h.style.animationDuration=6+Math.random()*6+"s"

hearts.appendChild(h)

}

/* heart burst */

function heartExplosion(){

for(let i=0;i<20;i++){

const h=document.createElement("div")

h.className="explosion-heart"
h.textContent="💖"

const x=(Math.random()*400-200)+"px"
const y=(Math.random()*400-200)+"px"

h.style.left=window.innerWidth/2+"px"
h.style.top=window.innerHeight/2+"px"

h.style.setProperty("--x",x)
h.style.setProperty("--y",y)

document.body.appendChild(h)

setTimeout(()=>h.remove(),800)

}

}

const packages=document.querySelectorAll(".package")
const packagesWrap=document.getElementById("packages")
const result=document.getElementById("result")
const heading=document.getElementById("heading")

packages.forEach(pkg=>{

pkg.addEventListener("click",(e)=>{

e.stopPropagation()

heartExplosion()

const type=pkg.dataset.type

packagesWrap.classList.add("hidden")
heading.classList.add("hidden")
result.classList.remove("hidden")

if(type==="home"){

result.innerHTML=`
No external API calls needed. You manage the full stack from appetizers
to the final “Sweet” commit.
<br><img src="chef.gif">
`

}

if(type==="spin"){

result.innerHTML=`
<div style="text-align:center;">
<p style="margin:0 0 10px 0;">Tap the emojis to look at your surprises!</p>
<div class="spin-links">
<a href="https://in.bookmyshow.com/events/pizza-making-date/ET00461460" target="_blank">🍕</a>
<a href="https://in.bookmyshow.com/events/pottery-workshop/ET00453223" target="_blank">🏺</a>
</div>
<button class="continue-btn" id="manualNextBtn">Next ➔</button>
</div>
`

// Attach manual redirect listener to the button so they don't get forced away early
document.getElementById("manualNextBtn").addEventListener("click", () => {
window.location.href="final.html"
})

}

if(type==="throughput"){

result.innerHTML=`<img src="shopping.gif">`

}

if(type==="offgrid"){

result.innerHTML=`
We’re going offline and you are paying for the strawberry matcha.
<br><img src="trip.gif">
`

}

/* Automatically redirect ONLY if it's not the interactive links package */
if(type !== "spin") {
setTimeout(()=>{
window.location.href="final.html"
},2500) // Bumped slightly to 2.5s so they can actually read the text response
}

})

})

</script>

</body>
</html>
